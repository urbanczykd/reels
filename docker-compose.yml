services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reelmaker
      POSTGRES_PASSWORD: reelmaker
      POSTGRES_DB: reelmaker_development
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c", "sleep 10 && ollama pull llama3.2"]

  web:
    build: .
    command: bash -c "bundle exec rails db:prepare && bundle exec rails server -b 0.0.0.0"
    environment:
      DATABASE_URL: postgresql://reelmaker:reelmaker@db/reelmaker_development
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - redis
      - ollama

  sidekiq:
    build: .
    command: bundle exec sidekiq
    environment:
      DATABASE_URL: postgresql://reelmaker:reelmaker@db/reelmaker_development
      REDIS_URL: redis://redis:6379/0
      OLLAMA_URL: http://ollama:11434
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  ollama_data:
  bundle_cache:
